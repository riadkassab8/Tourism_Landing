kind = "web"
previewPath = "/"
title = "Tourist Company Landing Page"
version = "1.0.0"
id = "artifacts/tourist-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22669

[services.development]
run = "pnpm --filter @workspace/tourist-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tourist-landing", "run", "build" ]
publicDir = "artifacts/tourist-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22669"
BASE_PATH = "/"
